sentence=An enterprise-grade library to connect ESP8266 and ESP32 devices to the ThingsSentral.io platform.
paragraph=This library provides three core modules: Command for live telemetry with Keep-Alive connection reuse, Vault for safe offline data persistence using LittleFS, and History for memory-safe, auto-chunked bulk data payloads. Hardened against memory leaks and socket exhaustion.
